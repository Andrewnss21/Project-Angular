<aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full relative">

  <!-- Logo -->
  <div class="px-6 py-5 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <span class="text-white text-sm font-bold">E</span>
      </div>
      <span class="font-semibold text-gray-800 text-sm">EduGestión</span>
    </div>
  </div>

  <!-- Navegación -->
  <nav class="flex-1 px-3 py-4 space-y-1">
    <a *ngFor="let item of navItems"
       [routerLink]="item.route"
       routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
       [routerLinkActiveOptions]="{ exact: true }"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-gray-600 hover:bg-gray-50 hover:text-gray-900">
      <span class="text-lg">{{ item.icon }}</span>
      {{ item.label }}
    </a>
  </nav>

  <!-- Menú desplegable de usuario -->
  <div class="relative px-4 py-4 border-t border-gray-100">

    <!-- Dropdown (se muestra arriba del botón) -->
    <div *ngIf="menuOpen()"
         class="absolute bottom-16 left-4 right-4 bg-white border border-gray-100 rounded-xl shadow-lg overflow-hidden">
      <button
        (click)="logout()"
        class="w-full flex items-center gap-2.5 px-4 py-3 text-sm text-red-500 hover:bg-red-50 transition-colors">
        <span class="text-base">🚪</span>
        Cerrar sesión
      </button>
    </div>

    <!-- Botón de perfil -->
    <button
      (click)="toggleMenu()"
      class="w-full flex items-center gap-3 hover:bg-gray-50 rounded-lg p-1.5 -m-1.5 transition-colors">
      <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center flex-shrink-0">
        <span class="text-indigo-700 text-xs font-semibold">{{ initials }}</span>
      </div>
      <div class="flex-1 min-w-0 text-left">
        <p class="text-sm font-medium text-gray-800 truncate">{{ currentUser.name }}</p>
        <p class="text-xs text-gray-400 truncate">{{ currentUser.role }}</p>
      </div>
      <span class="text-gray-300 text-xs">{{ menuOpen() ? '▲' : '▼' }}</span>
    </button>

  </div>

</aside>
