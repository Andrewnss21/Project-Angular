<aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full">

  <!-- Logo -->
  <div class="px-6 py-5 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <div>
        <p class="font-bold text-gray-800 text-sm leading-tight">EduGestión</p>
        <p class="text-xs text-gray-400">Sistema Escolar</p>
      </div>
    </div>
  </div>

  <!-- Navegación -->
  <nav class="flex-1 px-3 py-4 space-y-0.5">

    <!-- Dashboard -->
    <a *ngIf="isTeacher || isParent"
       [routerLink]="isTeacher ? '/teacher/dashboard' : '/parent/dashboard'"
       routerLinkActive="bg-indigo-600 text-white shadow-sm"
       [routerLinkActiveOptions]="{ exact: true }"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      {{ isTeacher ? 'Dashboard' : 'Mi Portal' }}
    </a>

    <!-- Asistencia (solo docente) -->
    <a *ngIf="isTeacher"
       routerLink="/teacher/attendance"
       routerLinkActive="bg-indigo-600 text-white shadow-sm"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
      </svg>
      Asistencia
    </a>

    <!-- Calificaciones (solo docente) -->
    <a *ngIf="isTeacher"
       routerLink="/teacher/grades"
       routerLinkActive="bg-indigo-600 text-white shadow-sm"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      Calificaciones
    </a>

    <!-- Estudiantes (solo docente) -->
    <a *ngIf="isTeacher"
       routerLink="/teacher/students"
       routerLinkActive="bg-indigo-600 text-white shadow-sm"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Estudiantes
    </a>

  </nav>

  <!-- Usuario -->
  <div class="relative px-4 py-4 border-t border-gray-100">
    <div *ngIf="menuOpen()"
         class="absolute bottom-16 left-4 right-4 bg-white border border-gray-100 rounded-xl shadow-lg overflow-hidden">
      <button
        (click)="logout()"
        class="w-full flex items-center gap-2.5 px-4 py-3 text-sm text-red-500 hover:bg-red-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Cerrar sesión
      </button>
    </div>

    <button
      (click)="toggleMenu()"
      class="w-full flex items-center gap-3 hover:bg-gray-50 rounded-xl p-2 transition-colors">
      <div class="w-9 h-9 bg-indigo-100 rounded-full flex items-center justify-center flex-shrink-0">
        <span class="text-indigo-700 text-xs font-bold">{{ initials }}</span>
      </div>
      <div class="flex-1 min-w-0 text-left">
        <p class="text-sm font-semibold text-gray-800 truncate">{{ currentUser.name }}</p>
        <p class="text-xs text-gray-400 truncate">{{ currentUser.role }}</p>
      </div>
      <svg class="w-4 h-4 text-gray-300 transition-transform" [class.rotate-180]="menuOpen()" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
  </div>

</aside>
