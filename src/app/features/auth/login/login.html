<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mb-3">
        <span class="text-white text-xl font-bold">E</span>
      </div>
      <h1 class="text-xl font-semibold text-gray-800">EduGestión</h1>
      <p class="text-sm text-gray-400 mt-1">Sistema de Gestión Escolar</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-gray-100 p-8">

      <h2 class="text-lg font-semibold text-gray-800 mb-1">Iniciar sesión</h2>
      <p class="text-sm text-gray-400 mb-6">Ingresa tus credenciales para continuar</p>

      <!-- Selector de rol -->
      <div class="flex bg-gray-50 rounded-lg p-1 mb-6">
        <button
          (click)="rol = 'docente'"
          class="flex-1 py-2 text-sm rounded-md transition-colors"
          [class]="rol === 'docente'
            ? 'bg-white text-indigo-700 font-medium shadow-sm'
            : 'text-gray-500 hover:text-gray-700'">
          Docente
        </button>
        <button
          (click)="rol = 'representante'"
          class="flex-1 py-2 text-sm rounded-md transition-colors"
          [class]="rol === 'representante'
            ? 'bg-white text-indigo-700 font-medium shadow-sm'
            : 'text-gray-500 hover:text-gray-700'">
          Representante
        </button>
      </div>

      <!-- Formulario -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Usuario</label>
          <input
            type="text"
            [(ngModel)]="username"
            placeholder="juan.perez"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-200 text-sm text-gray-800 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Contraseña</label>
          <input
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-200 text-sm text-gray-800 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"/>
        </div>
        <p *ngIf="errorMessage" class="text-xs text-red-500 text-center">
          {{ errorMessage }}</p>

        <button
          (click)="onLogin()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors mt-2">
          Ingresar como {{ rol === 'docente' ? 'Docente' : 'Representante' }}
        </button>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      © 2026 EduGestión · Todos los derechos reservados
    </p>

  </div>
</div>
