<!-- Header de la vista -->
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
  <div>
    <h1 class="text-lg font-semibold text-gray-800">Registro de Asistencia</h1>
    <p class="text-xs text-gray-400 mt-0.5 capitalize">{{ today }}</p>
  </div>
  <div class="flex items-center gap-2">
    <button
      (click)="markAll('Presente')"
      class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition">
      ✅ Todos presentes
    </button>
    <button
      (click)="markAll('Ausente')"
      class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition">
      ❌ Todos ausentes
    </button>
  </div>
</div>

<!-- Tarjetas resumen -->
<div class="grid grid-cols-3 gap-4 mb-6">
  <div class="bg-white rounded-xl border border-gray-100 p-4 text-center">
    <p class="text-2xl font-semibold text-gray-800">{{ totalPresente() }}</p>
    <p class="text-xs text-green-500 font-medium mt-1">Presentes</p>
  </div>
  <div class="bg-white rounded-xl border border-gray-100 p-4 text-center">
    <p class="text-2xl font-semibold text-gray-800">{{ totalAusente() }}</p>
    <p class="text-xs text-red-400 font-medium mt-1">Ausentes</p>
  </div>
  <div class="bg-white rounded-xl border border-gray-100 p-4 text-center">
    <p class="text-2xl font-semibold text-gray-800">{{ totalTardanza() }}</p>
    <p class="text-xs text-amber-500 font-medium mt-1">Tardanzas</p>
  </div>
</div>

<!-- Lista de estudiantes -->
<div class="bg-white rounded-xl border border-gray-100 overflow-hidden mb-6">
  <div class="px-5 py-4 border-b border-gray-50">
    <h2 class="text-sm font-semibold text-gray-800">Curso 3ro "A" — {{ students().length }} estudiantes</h2>
  </div>

  <div class="divide-y divide-gray-50">
    <div *ngFor="let s of students()"
         class="flex items-center justify-between px-5 py-3.5 hover:bg-gray-50 transition">

      <!-- Nombre -->
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
          <span class="text-indigo-700 text-xs font-semibold">
            {{ s.name.charAt(0) }}
          </span>
        </div>
        <span class="text-sm text-gray-700 font-medium">{{ s.name }}</span>
      </div>

      <!-- Botones de estado -->
      <div class="flex items-center gap-2">
        <button
          (click)="setStatus(s.id, 'Presente')"
          class="text-xs px-3 py-1.5 rounded-lg font-medium transition"
          [class]="s.status === 'Presente'
            ? 'bg-green-100 text-green-700'
            : 'bg-gray-100 text-gray-400 hover:bg-green-50 hover:text-green-600'">
          Presente
        </button>
        <button
          (click)="setStatus(s.id, 'Tardanza')"
          class="text-xs px-3 py-1.5 rounded-lg font-medium transition"
          [class]="s.status === 'Tardanza'
            ? 'bg-amber-100 text-amber-700'
            : 'bg-gray-100 text-gray-400 hover:bg-amber-50 hover:text-amber-600'">
          Tardanza
        </button>
        <button
          (click)="setStatus(s.id, 'Ausente')"
          class="text-xs px-3 py-1.5 rounded-lg font-medium transition"
          [class]="s.status === 'Ausente'
            ? 'bg-red-100 text-red-600'
            : 'bg-gray-100 text-gray-400 hover:bg-red-50 hover:text-red-500'">
          Ausente
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Botón guardar -->
<div class="flex items-center justify-between">
  <p *ngIf="saved()" class="text-sm text-green-600 font-medium flex items-center gap-1.5">
    ✓ Asistencia guardada correctamente
  </p>
  <div *ngIf="!saved()"></div>
  <button
    (click)="saveAttendance()"
    class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-6 py-2.5 rounded-lg transition-colors">
    Guardar asistencia
  </button>
</div>
