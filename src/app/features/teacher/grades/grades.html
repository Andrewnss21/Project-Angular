<!-- Header -->
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
  <div>
    <h1 class="text-lg font-semibold text-gray-800">Calificaciones</h1>
    <p class="text-xs text-gray-400 mt-0.5">Curso 3ro "A" — Primer Quimestre</p>
  </div>
  <div class="flex items-center gap-3">
    <div class="bg-indigo-50 text-indigo-700 text-sm font-semibold px-4 py-2 rounded-lg">
      Promedio del curso: {{ classAverage() }}
    </div>
  </div>
</div>

<!-- Tabla de calificaciones -->
<div class="bg-white rounded-xl border border-gray-100 overflow-x-auto mb-6">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-left text-xs text-gray-400 border-b border-gray-100">
        <th class="px-5 py-3 font-medium">Estudiante</th>
        <th *ngFor="let m of materias" class="px-4 py-3 font-medium text-center">{{ m }}</th>
        <th class="px-4 py-3 font-medium text-center">Promedio</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-50">
      <tr *ngFor="let s of students()" class="hover:bg-gray-50 transition">

        <!-- Nombre -->
        <td class="px-5 py-3">
          <div class="flex items-center gap-2.5">
            <div class="w-7 h-7 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0">
              <span class="text-indigo-700 text-xs font-semibold">{{ s.name.charAt(0) }}</span>
            </div>
            <span class="text-gray-700 font-medium whitespace-nowrap">{{ s.name }}</span>
          </div>
        </td>

        <!-- Notas editables -->
        <td *ngFor="let m of materias" class="px-4 py-3 text-center">
          <input
            type="number"
            min="0" max="10" step="0.1"
            [value]="s.grades[m]"
            (change)="updateGrade(s.id, m, $any($event.target).value)"
            class="w-16 text-center text-sm border border-gray-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
            [class]="getGradeColor(s.grades[m])"/>
        </td>

        <!-- Promedio -->
        <td class="px-4 py-3 text-center">
          <span class="font-semibold text-sm" [class]="getGradeColor(getAverage(s.grades))">
            {{ getAverage(s.grades) }}
          </span>
        </td>

      </tr>
    </tbody>
  </table>
</div>

<!-- Leyenda + Guardar -->
<div class="flex items-center justify-between">
  <div class="flex items-center gap-4 text-xs text-gray-400">
    <span class="text-green-600 font-medium">● 9-10 Excelente</span>
    <span class="text-amber-500 font-medium">● 7-8 Regular</span>
    <span class="text-red-500 font-medium">● 0-6 Bajo</span>
  </div>
  <div class="flex items-center gap-3">
    <p *ngIf="saved()" class="text-sm text-green-600 font-medium">
      ✓ Calificaciones guardadas
    </p>
    <button
      (click)="saveGrades()"
      class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-6 py-2.5 rounded-lg transition-colors">
      Guardar cambios
    </button>
  </div>
</div>
