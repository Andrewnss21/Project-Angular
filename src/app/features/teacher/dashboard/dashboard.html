<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
  <div *ngFor="let card of statCards"
       class="bg-white rounded-xl border border-gray-100 p-5">
    <p class="text-xs text-gray-400 font-medium uppercase tracking-wide">{{ card.label }}</p>
    <p class="text-2xl font-semibold text-gray-800 mt-1">{{ card.value }}</p>
    <p class="text-xs mt-1" [class]="card.positive ? 'text-green-500' : 'text-red-400'">
      {{ card.trend }}
    </p>
  </div>
</div>

<div class="bg-white rounded-xl border border-gray-100 p-5">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-sm font-semibold text-gray-800">Asistencia de hoy — 3ro "A"</h2>
    <button class="text-xs text-indigo-600 hover:underline">Ver todos</button>
  </div>
  <table class="w-full text-sm">
    <thead>
      <tr class="text-left text-xs text-gray-400 border-b border-gray-50">
        <th class="pb-3 font-medium">Estudiante</th>
        <th class="pb-3 font-medium">Estado</th>
        <th class="pb-3 font-medium">Hora</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of students" class="border-b border-gray-50 last:border-0">
        <td class="py-3 text-gray-700 font-medium">{{ s.name }}</td>
        <td class="py-3">
          <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                [class]="s.status === 'Presente'
                  ? 'bg-green-50 text-green-700'
                  : 'bg-red-50 text-red-600'">
            {{ s.status }}
          </span>
        </td>
        <td class="py-3 text-gray-400">{{ s.time }}</td>
      </tr>
    </tbody>
  </table>
</div>
